<?xml version="1.0" encoding="UTF-8"?>
<svg width="680" height="720" viewBox="0 0 680 720" xmlns="http://www.w3.org/2000/svg" role="img">
<title>LangGraph investment research pipeline</title>
<desc>End-to-end flowchart: POST /investment-jobs through Redis and Worker into the LangGraph graph (intake_brief, four parallel research agents, evidence_index, critic_output, finalize) producing an InvestmentMemo.</desc>
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<style>text{font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif}</style>

<rect width="680" height="720" fill="#ffffff"/>

<!-- Infrastructure -->
<rect x="240" y="50" width="200" height="44" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="72" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">POST /investment-jobs</text>

<line x1="340" y1="94" x2="340" y2="118" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="270" y="118" width="140" height="44" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="140" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Redis queue</text>

<line x1="340" y1="162" x2="340" y2="186" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="275" y="186" width="130" height="44" rx="4" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="208" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">app.worker</text>

<line x1="340" y1="230" x2="340" y2="258" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- LangGraph: intake_brief -->
<rect x="265" y="258" width="150" height="44" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="280" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">intake_brief</text>

<!-- Fan-out stem + distributor bar + 4 arrows -->
<line x1="340" y1="302" x2="340" y2="320" stroke="#888780" stroke-width="1.5"/>
<line x1="103" y1="320" x2="577" y2="320" stroke="#888780" stroke-width="1.5"/>
<line x1="103" y1="320" x2="103" y2="338" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="261" y1="320" x2="261" y2="338" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="419" y1="320" x2="419" y2="338" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="577" y1="320" x2="577" y2="338" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- Parallel research label + dashed container -->
<text x="34" y="313" font-size="11" fill="#B4B2A9">Parallel research</text>
<rect x="20" y="324" width="640" height="72" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="5 4"/>

<!-- 4 agent boxes y=338 h=44 -->
<rect x="28"  y="338" width="150" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="103" y="360" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Market agent</text>

<rect x="186" y="338" width="150" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="261" y="360" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Filing agent</text>

<rect x="344" y="338" width="150" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="419" y="360" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Web intel agent</text>

<rect x="502" y="338" width="150" height="44" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="577" y="360" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">News/risk agent</text>

<!-- Fan-in: 4 stubs + collector bar + single arrow -->
<line x1="103" y1="382" x2="103" y2="394" stroke="#888780" stroke-width="1.5"/>
<line x1="261" y1="382" x2="261" y2="394" stroke="#888780" stroke-width="1.5"/>
<line x1="419" y1="382" x2="419" y2="394" stroke="#888780" stroke-width="1.5"/>
<line x1="577" y1="382" x2="577" y2="394" stroke="#888780" stroke-width="1.5"/>
<line x1="103" y1="394" x2="577" y2="394" stroke="#888780" stroke-width="1.5"/>
<line x1="340" y1="394" x2="340" y2="406" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- evidence_index -->
<rect x="260" y="406" width="160" height="44" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="428" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">evidence_index</text>

<line x1="340" y1="450" x2="340" y2="470" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- critic_output (two-line) -->
<rect x="230" y="470" width="220" height="56" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="340" y="489" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">critic_output</text>
<text x="340" y="508" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Citations · freshness · bias</text>

<line x1="340" y1="526" x2="340" y2="546" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- finalize -->
<rect x="290" y="546" width="100" height="44" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="568" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">finalize</text>

<line x1="340" y1="590" x2="340" y2="610" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<!-- InvestmentMemo (terminal) -->
<rect x="220" y="610" width="240" height="44" rx="4" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="340" y="632" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">InvestmentMemo</text>

<!-- Legend -->
<line x1="40" y1="670" x2="640" y2="670" stroke="#E8E6E0" stroke-width="0.5"/>

<rect x="50"  y="682" width="10" height="10" rx="2" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="66"  y="691" font-size="11" fill="#888780">Infrastructure</text>

<rect x="165" y="682" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="181" y="691" font-size="11" fill="#888780">Orchestration</text>

<rect x="295" y="682" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="311" y="691" font-size="11" fill="#888780">Research agents</text>

<rect x="432" y="682" width="10" height="10" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="448" y="691" font-size="11" fill="#888780">Evaluation</text>

<rect x="530" y="682" width="10" height="10" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="546" y="691" font-size="11" fill="#888780">Output</text>

</svg>
